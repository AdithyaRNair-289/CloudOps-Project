name: CloudOps CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unit-integration-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pytest

    - name: Run unit tests
      run: |
        echo "Running CloudOps unit tests..."
        python -m pytest CICD-Pipeline/test_app.py -v
        echo "All unit tests passed!"

  docker-build-push:
    runs-on: ubuntu-latest
    needs: unit-integration-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t adithyarnair/cloudops-app:latest ./Infrastructure
        echo "Docker build successful!"

    - name: Push Docker image to Docker Hub
      run: |
        docker push adithyarnair/cloudops-app:latest
        echo "Docker image pushed to Docker Hub!"

  deploy-notification:
    runs-on: ubuntu-latest
    needs: docker-build-push
    
    steps:
    - name: Deployment success notification
      run: |
        echo "CloudOps application successfully built, tested and deployed!"
        echo "Docker Image: adithyarnair/cloudops-app:latest"
        echo "Pipeline completed at: $(date)"